  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0c0b07; --surface:#161410; --surface2:#1e1c14; --border:#2a2418;
      --accent:#c86b2a; --accent-glow:rgba(200,107,42,0.18); --accent2:#8b2c1a;
      --text:#ede0c4; --muted:#7a6a52; --dim:#4a4030;
      --green:#3a6a3a; --green-light:#4a9a4a;
      --type-drive:#4a8aaa; --type-activity:#c86b2a; --type-lodging:#7060aa;
      --type-fly:#4a9060; --type-checkin:#c8a02a; --type-visitor:#aa3030;
      --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
      --hdr:72px; --tabs:46px; --bar:3px;
      --top:calc(var(--hdr) + var(--tabs) + var(--bar) + var(--safe-top));
    }
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
      -webkit-font-smoothing:antialiased;}
    #hdr{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg);
      border-bottom:1px solid var(--border);padding-top:var(--safe-top);}
    #hdr-inner{height:var(--hdr);display:flex;align-items:center;
      justify-content:space-between;padding:0 16px;}
    #trip-title{font-size:20px;font-weight:700;letter-spacing:-.3px;}
    #trip-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
    #pct{font-size:24px;font-weight:700;color:var(--accent);line-height:1;text-align:right;}
    #pct-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:right;}
    #bar-wrap{height:var(--bar);background:var(--surface2);}
    #bar-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .5s ease;width:0%;}
    #tabs{position:fixed;top:calc(var(--hdr) + var(--bar) + var(--safe-top));left:0;right:0;z-index:100;
      height:var(--tabs);display:flex;overflow-x:auto;overflow-y:hidden;
      background:var(--bg);border-bottom:1px solid var(--border);
      -webkit-overflow-scrolling:touch;scrollbar-width:none;}
    #tabs::-webkit-scrollbar{display:none;}
    .tab{flex:0 0 auto;height:100%;padding:0 13px;display:flex;flex-direction:column;
      align-items:center;justify-content:center;cursor:pointer;position:relative;
      -webkit-tap-highlight-color:transparent;}
    .tab-lbl{font-size:12px;font-weight:500;color:var(--muted);white-space:nowrap;}
    .tab.active .tab-lbl{color:var(--accent);font-weight:700;}
    .tab.active::after{content:'';position:absolute;bottom:0;left:8px;right:8px;
      height:2px;background:var(--accent);border-radius:2px 2px 0 0;}
    .tab.alldone .tab-lbl::after{content:' ✓';color:var(--green-light);}
    #content{position:fixed;top:var(--top);left:0;right:0;bottom:0;
      overflow-y:auto;-webkit-overflow-scrolling:touch;
      padding:14px 12px calc(20px + var(--safe-bottom));background:var(--bg);}
    .day-hdr{margin-bottom:14px;}
    .day-hdr h2{font-size:22px;font-weight:700;letter-spacing:-.4px;}
    .day-hdr p{font-size:12px;color:var(--muted);margin-top:3px;}
    .card{background:var(--surface);border-radius:13px;margin-bottom:9px;
      border:1px solid var(--border);overflow:hidden;transition:opacity .3s,background .3s;}
    .card.done{opacity:.42;}
    .card-top{display:flex;align-items:center;padding:12px 12px 12px 10px;gap:10px;
      cursor:pointer;-webkit-tap-highlight-color:transparent;}
    .badge{flex:0 0 auto;font-size:9px;font-weight:700;text-transform:uppercase;
      letter-spacing:.6px;padding:3px 7px;border-radius:6px;min-width:58px;text-align:center;line-height:1.4;}
    .b-drive{background:rgba(74,138,170,.15);color:var(--type-drive);}
    .b-activity{background:rgba(200,107,42,.15);color:var(--type-activity);}
    .b-lodging{background:rgba(112,96,170,.15);color:var(--type-lodging);}
    .b-fly{background:rgba(74,144,96,.15);color:var(--type-fly);}
    .b-checkin{background:rgba(200,160,42,.15);color:var(--type-checkin);}
    .b-visitor{background:rgba(170,48,48,.15);color:var(--type-visitor);}
    .card-info{flex:1 1 auto;min-width:0;}
    .card-loc{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;
      margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .card-title{font-size:14px;font-weight:600;line-height:1.25;}
    .card-detail{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.3;}
    .card-right{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:5px;}
    .done-btn{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);
      background:transparent;display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:all .25s;-webkit-tap-highlight-color:transparent;}
    .done-btn.on{background:var(--green);border-color:var(--green);}
    .done-btn svg{opacity:0;transition:opacity .2s;}
    .done-btn.on svg{opacity:1;}
    .chev{width:16px;height:16px;color:var(--dim);transition:transform .25s;}
    .chev.open{transform:rotate(180deg);}
    .card-body{max-height:0;overflow:hidden;transition:max-height .4s ease;}
    .card-body.open{max-height:1200px;}
    .card-body-inner{padding:10px 12px 14px;border-top:1px solid var(--border);}
    .alert-tag{display:inline-flex;align-items:center;gap:4px;
      background:var(--accent-glow);border:1px solid rgba(200,107,42,.3);
      border-radius:20px;padding:3px 9px;font-size:11px;font-weight:600;color:var(--accent);margin-bottom:8px;}
    .notes{font-size:13px;color:var(--muted);line-height:1.7;white-space:pre-wrap;}
    .conf-row{margin-top:11px;display:inline-flex;align-items:center;gap:8px;
      background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:7px 11px;}
    .conf-lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;}
    .conf-val{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.5px;}
    .links-wrap{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;}
    .link-pill{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;
      background:rgba(74,138,170,.10);border:1px solid rgba(74,138,170,.25);
      border-radius:8px;text-decoration:none;font-size:11px;font-weight:500;color:#5aaacc;
      -webkit-tap-highlight-color:transparent;white-space:nowrap;transition:background .15s;}
    .link-pill:active{background:rgba(74,138,170,.25);}
  </style>
</head>

const KEY=‘mightyfive_v1’;
let done=new Set(JSON.parse(localStorage.getItem(KEY)||’[]’));
let day=0;
const totalStops=DAYS.reduce((a,d)=>a+d.stops.length,0);
function save(){localStorage.setItem(KEY,JSON.stringify([…done]));}
const $=id=>document.getElementById(id);
const badgeLabel={drive:‘Drive’,activity:‘Activity’,lodging:‘Lodging’,fly:‘Fly’,checkin:‘Check-In’,visitor:‘Visitor Ctr’};

function updateProgress(){
const pct=totalStops?Math.round(done.size/totalStops*100):0;
$(‘pct’).textContent=pct+’%’;
$(‘bar-fill’).style.width=pct+’%’;
}
function buildTabs(){
const el=$(‘tabs’);el.innerHTML=’’;
DAYS.forEach((d,i)=>{
const allDone=d.stops.every(s=>done.has(s.id));
const t=document.createElement(‘div’);
t.className=‘tab’+(i===day?’ active’:’’)+(allDone?’ alldone’:’’);
t.innerHTML=`<div class="tab-lbl">${d.label}</div>`;
t.addEventListener(‘click’,()=>selectDay(i));
el.appendChild(t);
});
}
function buildContent(){
const d=DAYS[day];
let h=`<div class="day-hdr"><h2>${d.title}</h2><p>${d.sub}</p></div>`;
d.stops.forEach(s=>{
const isDone=done.has(s.id);
const linkHtml=s.links&&s.links.length
?`<div class="links-wrap">${s.links.map(l=>`<a class="link-pill" href="${l.url}" target="_blank" rel="noopener">📍 ${l.label}</a>`).join('')}</div>`
:’’;
h+=` <div class="card${isDone?' done':''}" data-id="${s.id}"> <div class="card-top" onclick="toggleExp('${s.id}')"> <span class="badge b-${s.type}">${badgeLabel[s.type]||s.type}</span> <div class="card-info"> <div class="card-loc">${s.loc}</div> <div class="card-title">${s.title}</div> ${s.detail?`<div class="card-detail">${s.detail}</div>`:''} </div> <div class="card-right"> <div class="done-btn${isDone?' on':''}" onclick="event.stopPropagation();toggleDone('${s.id}')"> <svg width="13" height="13" viewBox="0 0 13 13" fill="none"> <polyline points="2,6.5 5.5,10 11,3" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/> </svg> </div> <svg class="chev" viewBox="0 0 16 16" fill="currentColor"><path d="M8 10.5L2.5 5h11z"/></svg> </div> </div> <div class="card-body" id="b-${s.id}"> <div class="card-body-inner"> ${s.alert?`<div class="alert-tag">⏰ ${s.alert}</div><br>`:''} <div class="notes">${s.notes}</div> ${s.conf?`<div class="conf-row"><span class="conf-lbl">Conf #</span><span class="conf-val">${s.conf}</span></div>`:''} ${linkHtml} </div> </div> </div>`;
});
$(‘content’).innerHTML=h;
}
function selectDay(i){
day=i;buildTabs();buildContent();$(‘content’).scrollTop=0;
const tab=document.querySelectorAll(’.tab’)[i];
if(tab)tab.scrollIntoView({behavior:‘smooth’,block:‘nearest’,inline:‘center’});
}
function toggleExp(id){
const body=document.getElementById(‘b-’+id);
const open=body.classList.contains(‘open’);
body.classList.toggle(‘open’,!open);
body.closest(’.card’).querySelector(’.chev’).classList.toggle(‘open’,!open);
}
function toggleDone(id){
done.has(id)?done.delete(id):done.add(id);save();
const card=document.querySelector(`.card[data-id="${id}"]`);
if(card){card.classList.toggle(‘done’,done.has(id));card.querySelector(’.done-btn’).classList.toggle(‘on’,done.has(id));}
updateProgress();buildTabs();
}
buildTabs();buildContent();updateProgress();
</script>
